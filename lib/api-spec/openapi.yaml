  # Competitors
  /competitors:
    get:
      operationId: listCompetitors
      tags: [competitors]
      summary: List competitors
      parameters:
        - name: clientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of competitors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competitor"
    post:
      operationId: createCompetitor
      tags: [competitors]
      summary: Add a competitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetitorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competitor"

  /competitors/{id}:
    delete:
      operationId: deleteCompetitor
      tags: [competitors]
      summary: Delete a competitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reports
  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List reports
      parameters:
        - name: clientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: createReport
      tags: [reports]
      summary: Generate a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AdminUser"

    AdminUser:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
        createdAt:
          type: string

    DashboardStats:
      type: object
      required: [totalClients, activeCampaigns, totalKeywords, newBacklinks30d]
      properties:
        totalClients:
          type: integer
        activeClients:
          type: integer
        activeCampaigns:
          type: integer
        totalKeywords:
          type: integer
        newBacklinks30d:
          type: integer
        totalRevenue:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        entityId:
          type: ["integer", "null"]
        createdAt:
          type: string

    RevenueDataPoint:
      type: object
      required: [month, revenue]
      properties:
        month:
          type: string
        revenue:
          type: number

    KeywordAlert:
      type: object
      required: [keywordId, keywordText, campaignName, clientName, previousRank, currentRank, drop]
      properties:
        keywordId:
          type: integer
        keywordText:
          type: string
        campaignName:
          type: string
        clientName:
          type: string
        previousRank:
          type: ["integer", "null"]
        currentRank:
          type: ["integer", "null"]
        drop:
          type: integer

    Client:
      type: object
      required: [id, name, email, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        websiteUrl:
          type: ["string", "null"]
        assignedPlanId:
          type: ["integer", "null"]
        planName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive]
        createdAt:
