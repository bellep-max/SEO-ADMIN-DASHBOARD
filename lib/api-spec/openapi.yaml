  /backlinks/disavow:
    get:
      operationId: getDisavowList
      tags: [backlinks]
      summary: Get disavow list for toxic backlinks
      parameters:
        - name: clientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Disavow list text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisavowList"

  /backlinks/{id}:
    patch:
      operationId: updateBacklink
      tags: [backlinks]
      summary: Update a backlink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacklinkUpdate"
      responses:
        "200":
          description: Updated backlink
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backlink"
    delete:
      operationId: deleteBacklink
      tags: [backlinks]
      summary: Delete a backlink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
